name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build web assets (Vite)
        run: npm run build

      - name: Install Capacitor CLI
        run: npm install --no-save @capacitor/cli @capacitor/core @capacitor/android

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 33
          build-tools: 33.0.2

      - name: Grant gradlew execute
        run: chmod +x android/gradlew

      - name: Build APK (debug)
        working-directory: android
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace | tee build-debug.log

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: app-debug-apk
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/build-debug.log

      - name: Build and sign release APK (if keystore provided)
        if: ${{ secrets.KEYSTORE_BASE64 && secrets.KEYSTORE_PASSWORD && secrets.KEY_ALIAS && secrets.KEY_PASSWORD }}
        working-directory: android
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore
          mkdir -p $HOME/.android
          echo "store=file:$(pwd)/release.keystore\nstorePassword=$KEYSTORE_PASSWORD\nkeyAlias=$KEY_ALIAS\nkeyPassword=$KEY_PASSWORD" > $HOME/.android/keystore.properties
          set -o pipefail
          ./gradlew assembleRelease --no-daemon --stacktrace | tee build-release.log

      - name: Upload release APK artifact (if produced)
        if: ${{ secrets.KEYSTORE_BASE64 && secrets.KEYSTORE_PASSWORD && secrets.KEY_ALIAS && secrets.KEY_PASSWORD }}
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: app-release-apk
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/build-release.log
