name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests + coverage gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Caption safety regex regressions must fail the build.
      # Run this suite first so failures surface immediately in the CI log.
      - name: Caption safety unit tests
        run: bunx vitest run src/utils/captionSafety.test.ts --reporter=verbose

      # Full suite + coverage thresholds (gated on src/utils/captionSafety.ts).
      # Any uncovered line/branch/function in the validator fails the build.
      - name: Full test suite with coverage gate
        run: bun run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
