name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests + coverage gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Caption safety regex regressions must fail the build.
      # Run this suite first so failures surface immediately in the CI log.
      - name: Caption safety unit tests
        run: bunx vitest run src/utils/captionSafety.test.ts --reporter=verbose

      # Full suite + coverage thresholds (gated on src/utils/captionSafety.ts).
      # Any uncovered line/branch/function in the validator fails the build.
      - name: Full test suite with coverage gate
        run: bun run test:coverage

      # Always upload coverage so failed threshold runs are inspectable.
      # `if: always()` ensures the artifacts upload even when test:coverage exits
      # non-zero (e.g. a captionSafety branch dropped below the threshold).

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload coverage JSON summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-json-summary
          path: coverage/coverage-summary.json
          if-no-files-found: warn
          retention-days: 30

      - name: Print coverage summary to job log
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "::group::captionSafety.ts coverage"
            node -e "const s=require('./coverage/coverage-summary.json');const k=Object.keys(s).find(x=>x.endsWith('captionSafety.ts'));console.log(k?JSON.stringify(s[k],null,2):'captionSafety.ts not found in summary');"
            echo "::endgroup::"
          else
            echo "No coverage summary produced (tests may have failed before coverage)."
          fi
